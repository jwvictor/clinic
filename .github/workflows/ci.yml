name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache: true

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache: true

      - name: Build binary
        run: go build -o clinic .

      - name: Smoke test - version
        run: ./clinic version

      - name: Smoke test - stacks
        run: ./clinic stacks

      - name: Smoke test - list all
        run: ./clinic list --all

      - name: Smoke test - doctor
        run: ./clinic doctor
